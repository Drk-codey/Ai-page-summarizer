services:
  - type: web
    name: ai-page-summarizer
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this in the Render dashboard for security
      - key: AI_MODEL
        value: llama-3.1-8b-instant
      - key: RATE_LIMIT_MAX
        value: "15"
